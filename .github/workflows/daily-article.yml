name: 毎日自動記事生成

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install anthropic

      - name: 記事を自動生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate-article.py

      - name: 生成した記事をコミット
        run: |
          git config --global user.name "AIツールナビ Bot"
          git config --global user.email "bot@ai-tool-navi.vercel.app"
          git add content/posts/
          git diff --staged --quiet || git commit -m "🤖 自動生成記事: $(date '+%Y-%m-%d')"
          git push
